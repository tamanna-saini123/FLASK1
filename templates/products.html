<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Explorer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/products.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark px-4">

<a class="navbar-brand fw-bold"
href="/">

My Portfolio

</a>

<a href="/api"
class="btn btn-outline-light">

← Back

</a>

</nav>

<section class="hero">

<div class="container text-center">

<h1>Product Explorer</h1>

<p>

Browse products using the DummyJSON REST API

</p>

<div class="badge-row">

<span>Python</span>

<span>REST API</span>

<span>JSON</span>

<span>DummyJSON</span>

</div>

</div>

</section>

<section class="container py-5">

<div class="row g-4">

{% for product in products %}

<div class="col-lg-4 col-md-6">

<div class="product-card">

<img
src="{{ product.thumbnail }}"
class="product-image">

<h4>

{{ product.title }}

</h4>

<p>

{{ product.brand }}

</p>

<span class="category">

{{ product.category }}

</span>

<h3>

${{ product.price }}

</h3>

<div class="details">

<p>

⭐ {{ product.rating }}

</p>

<p>

Stock:
{{ product.stock }}

</p>

</div>

</div>

</div>

{% endfor %}

</div>

</section>

</body>

</html>
