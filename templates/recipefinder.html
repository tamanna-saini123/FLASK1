<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recipe Finder</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/recipefinder.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark px-4">

<a class="navbar-brand fw-bold"
href="/">My Portfolio</a>

<a href="/api"
class="btn btn-outline-light">

← Back

</a>

</nav>

<section class="hero">

<div class="container text-center">

<h1>Recipe Finder</h1>

<p>

Discover delicious meals using TheMealDB API

</p>

<div class="badge-row">

<span>Python</span>

<span>REST API</span>

<span>TheMealDB</span>

<span>JSON</span>

</div>

</div>

</section>

<section class="container py-5">

<div class="row g-4">

{% for recipe in recipes %}

<div class="col-lg-4 col-md-6">

<div class="recipe-card">

<img src="{{ recipe.image }}"
class="recipe-image">

<h4>{{ recipe.meal }}</h4>

<div class="category">

{{ recipe.category }}

</div>

<p>

<strong>Cuisine:</strong>

{{ recipe.cuisine }}

</p>

<p>

{{ recipe.instructions }}

</p>

<a href="{{ recipe.youtube }}"
target="_blank"
class="btn btn-danger w-100">

<i class="fa-brands fa-youtube"></i>

Watch Recipe

</a>

</div>

</div>

{% endfor %}

</div>

</section>

</body>

</html>
