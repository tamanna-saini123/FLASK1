<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anime Explorer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/jikan.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand fw-bold" href="/">
        My Portfolio
    </a>

    <a href="/api" class="btn btn-outline-light">
        ← Back
    </a>

</nav>

<!-- Hero -->

<section class="hero">

    <div class="container text-center">

        <h1>Anime Explorer</h1>

        <p>Top Rated Anime using the Jikan REST API</p>

        <div class="badge-row">

            <span>Python</span>
            <span>REST API</span>
            <span>JSON</span>
            <span>Jikan</span>

        </div>

    </div>

</section>

<!-- Anime Cards -->

<section class="container py-5">

    <div class="row g-4">

        {% for anime in anime %}

        <div class="col-lg-3 col-md-4 col-sm-6">

            <div class="anime-card">

                <img src="{{ anime.image }}"
                     class="anime-image"
                     alt="{{ anime.title }}">

                <h5>{{ anime.title }}</h5>

                <div class="score">

                    ⭐ {{ anime.score }}

                </div>

                <hr>

                <p>

                    <strong>Episodes</strong><br>

                    {{ anime.episodes }}

                </p>

                <p>

                    <strong>Status</strong><br>

                    {{ anime.status }}

                </p>

                <p>

                    <strong>Year</strong><br>

                    {{ anime.year }}

                </p>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

</body>

</html>
