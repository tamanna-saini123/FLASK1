<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Automation Exercise Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/automationexercise.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand fw-bold" href="/">My Portfolio</a>

    <a href="/dynamicscraping" class="btn btn-outline-light btn-sm">
        ← Back
    </a>

</nav>

<section class="hero">

    <div class="container text-center">

        <h1>
            <i class="fa-solid fa-cart-shopping"></i>
            Automation Exercise
        </h1>

        <p>Dynamic Product Scraping using Selenium</p>

    </div>

</section>

<div class="container py-5">

    <div class="row g-4">

        {% for product in products %}

        <div class="col-lg-3 col-md-4 col-sm-6">

            <div class="product-card">

                <img src="{{ product['Image URL'] }}"
                     alt="{{ product.Product }}">

                <div class="product-body">

                    <h5>{{ product.Product }}</h5>

                    <h4>{{ product.Price }}</h4>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
