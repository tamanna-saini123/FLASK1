<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IMDb Movie Scraper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/imdb.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand fw-bold" href="/">My Portfolio</a>

    <a href="/dynamicscraping" class="btn btn-outline-light btn-sm">
    ← Back
</a>

</nav>

<section class="hero">

    <div class="container text-center">

        <h1><i class="fa-solid fa-film"></i> IMDb Movie Scraper</h1>

        <p>Top IMDb Movies scraped using Selenium</p>

    </div>

</section>

<div class="container py-5">

    <div class="row g-4">

        {% for movie in products %}

        <div class="col-lg-4 col-md-6">

            <div class="movie-card">

                <img src="{{ movie['Image URL'] }}" alt="{{ movie.Title }}">

                <div class="movie-body">

                    <h4>{{ movie.Title }}</h4>

                    <div class="info">

                        <span><i class="fa-solid fa-calendar"></i> {{ movie.Year }}</span>

                        <span><i class="fa-solid fa-clock"></i> {{ movie.Duration }}</span>

                    </div>

                    <div class="info">

                        <span><i class="fa-solid fa-certificate"></i> {{ movie.Certificate }}</span>

                        <span class="rating">
                            ⭐ {{ movie.Rating }}
                        </span>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
