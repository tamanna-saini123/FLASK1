<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spotify Playlist Scraper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/spotify.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand fw-bold" href="/">My Portfolio</a>

    <a href="/dynamicscraping" class="btn btn-outline-light btn-sm">
        ← Back
    </a>

</nav>

<!-- Hero -->

<section class="hero">

    <div class="container text-center">

        <h1>

            <i class="fa-brands fa-spotify"></i>

            Spotify Playlist Scraper

        </h1>

        <p>Dynamic Music Data Scraping using Selenium</p>

    </div>

</section>

<!-- Songs -->

<div class="container py-5">

    <div class="row g-4">

        {% for song in songs %}

        <div class="col-lg-4 col-md-6">

            <div class="song-card">

                <div class="spotify-icon">

                    <i class="fa-brands fa-spotify"></i>

                </div>

                <div class="song-body">

                    <h4>{{ song.Song }}</h4>

                    <p>

                        <i class="fa-solid fa-user"></i>

                        {{ song.Artist }}

                    </p>

                    <span class="duration">

                        <i class="fa-regular fa-clock"></i>

                        {{ song.Duration }}

                    </span>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
