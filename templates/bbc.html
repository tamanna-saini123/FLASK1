<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BBC News Scraper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bbc.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-4">

    <a class="navbar-brand fw-bold" href="/">My Portfolio</a>

    <a href="/dynamicscraping" class="btn btn-outline-light btn-sm">
        ← Back
    </a>

</nav>

<!-- Hero -->

<section class="hero">

    <div class="container text-center">

        <h1><i class="fa-solid fa-newspaper"></i> BBC News Scraper</h1>

        <p>Latest BBC News Headlines scraped using Selenium</p>

    </div>

</section>

<!-- News Cards -->

<div class="container py-5">

    <div class="row g-4">

        {% for article in products %}

        <div class="col-lg-4 col-md-6">

            <div class="news-card">

                <div class="icon-box">

                    <i class="fa-solid fa-newspaper"></i>

                </div>

                <div class="news-body">

                    <h4>{{ article.Headline }}</h4>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
